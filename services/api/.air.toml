# Live reload for local API development: `air` from this directory.
# Install once: go install github.com/air-verse/air@latest

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  delay = 500
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  exclude_regex = ["_test\\.go$"]
  send_interrupt = true
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
