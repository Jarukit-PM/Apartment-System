# Dev Container stack: MongoDB + devcontainer (Go/Node via devcontainer.json features).
services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:jammy
    environment:
      # Picked up by every shell/process in this container (not only VS Code remoteEnv).
      # Local dev only — replace in real deployments. Must be >= 16 chars for the Go API.
      JWT_SECRET: devcontainer-compose-local-not-for-production
      MONGODB_URI: mongodb://mongo:27017/apartment_system
    volumes:
      - ..:/workspaces/Apartment-System:cached
    command: sleep infinity
    networks:
      - apartment_dev
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    volumes:
      - mongo_dev_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - apartment_dev
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  apartment_dev:
    driver: bridge

volumes:
  mongo_dev_data:
