# CI — runs on pull requests and pushes (all branches).
# Validates Go tests, Next.js lint/build, API Docker image build, and stack integration.

name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-test:
    name: Go API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.sum

      - name: Run tests
        run: go test ./...

  web-lint:
    name: Next.js lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  web-build:
    name: Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Build-time public URL; production value is set on Vercel.
          NEXT_PUBLIC_API_URL: http://localhost:8080

  docker-api:
    name: API Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: apartment-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Stack integration
    runs-on: ubuntu-latest
    env:
      BOOTSTRAP_ADMIN_EMAIL: ci-admin@example.invalid
      BOOTSTRAP_ADMIN_PASSWORD: ci-test-password-long-enough
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.sum

      - name: Prepare env file
        run: cp .env.example .env

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build --wait

      - name: Go integration tests
        working-directory: services/api
        env:
          API_BASE_URL: http://localhost:8080
          BOOTSTRAP_ADMIN_EMAIL: ${{ env.BOOTSTRAP_ADMIN_EMAIL }}
          BOOTSTRAP_ADMIN_PASSWORD: ${{ env.BOOTSTRAP_ADMIN_PASSWORD }}
        run: go test -tags=integration -count=1 -timeout=5m ./test/integration/...

      - name: Stack smoke script
        run: ./scripts/smoke-stack.sh

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
